name: Deploy (Vercel)

# Reusable Vercel deploy from CI. Vercel Hobby can't connect a private
# org-owned repo's Git integration, so we deploy from CI. The build runs ON
# VERCEL (no --prebuilt) so the Neon↔Vercel integration injects POSTGRES_URL
# and branches per preview, exactly as a Git-triggered deploy would.
# Caller example:
#   jobs:
#     deploy:
#       uses: pgsereno/workflows/.github/workflows/deploy-vercel.yml@main
#       with:
#         vercel-org-id: team_xxx
#         vercel-project-id: prj_xxx
#       secrets:
#         VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
#
# Preview-URL PR comment: since deploys no longer go through Vercel's Git
# integration, this workflow posts the preview URL as a sticky PR comment
# itself. That needs a writable GITHUB_TOKEN, and a reusable workflow can't
# elevate beyond the CALLER, so the caller's deploy job must grant it:
#   jobs:
#     deploy:
#       permissions:
#         contents: read
#         pull-requests: write
#       uses: pgsereno/workflows/.github/workflows/deploy-vercel.yml@main
# Without it the comment step is skipped (continue-on-error) — the deploy
# itself still succeeds.
on:
  workflow_call:
    inputs:
      vercel-org-id:
        description: Vercel team/org ID (not secret — lives in .vercel/project.json).
        type: string
        required: true
      vercel-project-id:
        description: Vercel project ID (not secret).
        type: string
        required: true
      vercel-cli-version:
        description: Vercel CLI major version to install.
        type: string
        default: "54"
    secrets:
      VERCEL_TOKEN:
        required: true

jobs:
  deploy:
    name: Vercel Deploy
    runs-on: blacksmith
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
      VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm i -g vercel@${{ inputs.vercel-cli-version }}

      # --archive=tgz uploads one tarball instead of many files, avoiding
      # Vercel's per-day uploaded-file-count limit. The CLI prints the
      # deployment URL to stdout (last line) and the "Inspect:" build-logs
      # URL to stderr — capture both (strip ANSI before grepping).
      - name: Deploy preview
        id: preview
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          vercel deploy --archive=tgz --token="${{ secrets.VERCEL_TOKEN }}" --yes \
            > deploy-out.txt 2> deploy-err.txt || { cat deploy-err.txt >&2; exit 1; }
          cat deploy-err.txt >&2
          url=$(tail -n1 deploy-out.txt)
          # Scope to the "Inspect:" line — vercel also prints an unrelated
          # vercel.com/docs telemetry URL we must not grab.
          inspect=$(sed -E 's/\x1b\[[0-9;]*m//g' deploy-err.txt \
            | grep -iE 'inspect' | grep -oE 'https://vercel\.com/[^ ]+' | head -n1 || true)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "inspect=$inspect" >> "$GITHUB_OUTPUT"

      # Replaces the comment the Vercel Git integration used to post. Sticky
      # via a hidden marker so re-runs update one comment instead of stacking.
      # continue-on-error: a caller that didn't grant pull-requests: write
      # still gets a green deploy, just no comment.
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.url != ''
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          INSPECT_URL: ${{ steps.preview.outputs.inspect }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const inspect = process.env.INSPECT_URL;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const updated = new Date().toISOString().replace("T", " ").slice(0, 16) + " UTC";
            const inspectCell = inspect ? `[Inspect](${inspect})` : "—";
            const marker = "<!-- vercel-preview-deployment -->";
            const body = [
              marker,
              "### ▲ Vercel preview deploy",
              "",
              "| Project | Status | Preview | Inspect | Commit | Updated |",
              "|---|---|---|---|---|---|",
              `| \`${context.repo.repo}\` | ✅ Ready | [Visit Preview](${url}) | ${inspectCell} | \`${sha}\` | ${updated} |`,
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Deploy production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prod --archive=tgz --token="${{ secrets.VERCEL_TOKEN }}" --yes
